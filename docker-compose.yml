# ==============================================
#  鸡蛋库存登记助手 — 1.3.1
#  启动: docker compose up -d --build
# ==============================================
services:
  eggnum:
    build:
      context: .
      args:
        APP_VERSION: "1.3.1"
    container_name: eggnum
    restart: unless-stopped
    ports:
      - "${EGGS_PORT:-5080}:5000"
    volumes:
      - eggnum_data:/data
    environment:
      - TZ=Asia/Shanghai
      - SECRET_KEY=${SECRET_KEY}
      - EGGS_DB_DIR=/data

volumes:
  eggnum_data:
    name: eggnum_data
