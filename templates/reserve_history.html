{% extends "base.html" %}
{% block title %}扣留记录{% endblock %}
{% block header_title %}
<a href="/" style="color:#fff;text-decoration:none;">← 返回</a>&nbsp;&nbsp;📦 扣留记录
{% endblock %}
{% block content %}
<style>
.rh-day { background:var(--color-surface); border-radius:var(--radius); margin-bottom:6px; box-shadow:var(--shadow); overflow:hidden; }
.rh-day__head { display:flex; align-items:center; gap:8px; padding:10px 14px; font-size:14px; font-weight:600; border-bottom:1px solid #f0f0f0; }
.rh-day__head label { font-size:12px; color:#999; margin-left:auto; cursor:pointer; }
.rh-spec { padding:8px 14px; border-bottom:1px solid #f0f0f0; }
.rh-spec__main { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.rh-spec__name { font-size:14px; }
.rh-spec__net { font-size:13px; font-weight:700; }
.rh-spec__net.pos { color:#2e7d32; } .rh-spec__net.neg { color:#c62828; }
.rh-spec__detail { display:none; padding:4px 0 8px 14px; border-top:1px dashed #eee; margin-top:4px; }
.rh-spec__detail.open { display:block; }
.rh-log-row { font-size:12px; color:#888; padding:2px 0; display:flex; align-items:center; gap:6px; }
.rh-log-time { color:#bbb; margin-left:auto; }
.rh-link-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.rh-link-dot.on { background:#4caf50; } .rh-link-dot.off { background:#e53935; }
.rh-link-sep { font-size:11px; padding:2px 0; border-top:1px dashed #ffe0b2; margin:2px 0; }
.rh-toolbar { display:none; background:#fff3e0; border:1px solid #ffcc80; border-radius:8px; padding:8px 14px; margin-bottom:10px; font-size:13px; }
</style>

<div id="rh-toolbar" class="rh-toolbar">
  已选 <strong id="rh-selected-count">0</strong> 天
  <button id="rh-delete-selected" style="margin-left:8px;padding:4px 10px;border:1px solid #e53935;color:#e53935;background:#fff;border-radius:6px;cursor:pointer;">删除选中</button>
  <button id="rh-cancel-select" style="padding:4px 10px;border:1px solid #ccc;background:#fff;border-radius:6px;cursor:pointer;">取消</button>
</div>
<div id="rh-list"><div class="att-empty">加载中...</div></div>
{% endblock %}
{% block scripts %}
<script>
(function(){
var selectedDates = new Set();
fetch('/api/reserve-history').then(function(r){
  if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
}).then(function(d){
  var el = document.getElementById('rh-list');
  if(!d.groups||!d.groups.length){el.innerHTML='<div class="att-empty">暂无记录</div>';return;}

  // Collect all link toggles with timestamps
  // Collect link toggles with timestamps
  var allLinkToggles = [];
  d.groups.forEach(function(g){
    g.items.forEach(function(it){
      if(it.category==='__link__') allLinkToggles.push({
        time: new Date(it.created_at+'Z').getTime(),
        on: it.delta > 0
      });
    });
  });

  function linkStateAt(timestamp) {
    // Find the nearest link toggle before this timestamp
    var state = true; // default ON
    allLinkToggles.forEach(function(lt){
      if(lt.time <= timestamp) state = lt.on;
    });
    return state;
  }

  var totals={},allDays=[];
  d.groups.slice().reverse().forEach(function(g){
    var specGroups={};
    g.items.forEach(function(it){
      if(it.category==='__link__'||it.category==='__联动__'||it.category==='__system__')return;
      var k=it.category+'_'+it.spec;
      if(!specGroups[k])specGroups[k]={cat:it.category,spec:it.spec,logs:[],netDelta:0};
      specGroups[k].logs.push(it); specGroups[k].netDelta+=it.delta;
    });
    var specs=[];
    Object.keys(specGroups).forEach(function(k){
      var sg=specGroups[k],batches=[],batch=null;
      sg.logs.forEach(function(log){
        var t=new Date(log.created_at+'Z').getTime();
        // Check if link toggle happened between this and previous log
        var linkBetween = false;
        if(batch){
          linkBetween = allLinkToggles.some(function(lt){
            return lt.time > batch.lastTime && lt.time < t;
          });
        }
        if(batch&&(t-batch.lastTime)<=5000&&batch.linked===log.linked&&!linkBetween){
          batch.delta+=log.delta;batch.lastTime=t;batch.count++;
        }else{
          if(batch)batches.push(batch);
          if(linkBetween){
            // Determine the new state after toggle
            var nextState = linkStateAt(t);
            batches.push({isLinkSep:true, on: nextState});
          }
          batch={delta:log.delta,firstTime:t,lastTime:t,count:1,linked:log.linked};
        }
      });
      if(batch)batches.push(batch);
      var old=(totals[k]||0),neu=old+sg.netDelta; totals[k]=neu;
      specs.push({cat:sg.cat,spec:sg.spec,netDelta:sg.netDelta,oldTotal:old,newTotal:neu,batches:batches});
    });
    allDays.push({date:g.date,specs:specs});
  });
  allDays.reverse();

  var html='';
  allDays.forEach(function(day){
    var dn=day.specs.reduce(function(s,sp){return s+sp.netDelta},0);
    html+='<div class="rh-day" data-date="'+day.date+'"><div class="rh-day__head"><span>'+day.date+'</span><span style="font-size:12px;color:#999;">净变动: '+(dn>0?'+':'')+dn+'</span><label><input type="checkbox" class="rh-select-day" data-date="'+day.date+'"> 选择</label></div>';
    day.specs.forEach(function(sp){
      var cls=sp.netDelta>0?'pos':(sp.netDelta<0?'neg':'');
      html+='<div class="rh-spec"><div class="rh-spec__main" onclick="this.nextElementSibling.classList.toggle(\'open\')"><span class="rh-spec__name">'+sp.cat+sp.spec+'枚</span><span class="rh-spec__net '+cls+'">'+(sp.netDelta>0?'+':'')+sp.netDelta+' '+sp.oldTotal+'→'+sp.newTotal+'</span></div><div class="rh-spec__detail">';
      sp.batches.forEach(function(b){
        if(b.isLinkSep){
          html+='<div class="rh-link-sep" style="color:'+(b.on?'#4caf50':'#e53935')+';">⚙ 联动'+(b.on?'开启':'关闭')+'</div>';
        }else{
          var t=new Date(b.firstTime),ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0');
          var dot=b.linked?'<span class="rh-link-dot on" title="联动开启"></span>':'<span class="rh-link-dot off" title="联动关闭"></span>';
          html+='<div class="rh-log-row">'+dot+'<span>'+(b.delta>0?'+':'')+b.delta+(b.count>1?' (×'+b.count+')':'')+'</span><span class="rh-log-time">'+ts+'</span></div>';
        }
      });
      html+='</div></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
  document.querySelectorAll('.rh-select-day').forEach(function(cb){cb.addEventListener('change',function(){if(cb.checked)selectedDates.add(cb.dataset.date);else selectedDates.delete(cb.dataset.date);document.getElementById('rh-selected-count').textContent=selectedDates.size;document.getElementById('rh-toolbar').style.display=selectedDates.size>0?'flex':'none';});});
}).catch(function(e){document.getElementById('rh-list').innerHTML='<div class="att-empty" style="color:#c62828;">⚠️ '+e.message+'</div>';});
document.getElementById('rh-delete-selected').addEventListener('click',function(){if(!selectedDates.size)return;if(!confirm('删除已选 '+selectedDates.size+' 天记录？'))return;fetch('/api/reserve-history?dates='+encodeURIComponent(Array.from(selectedDates).join(',')),{method:'DELETE'}).then(function(){location.reload();});});
document.getElementById('rh-cancel-select').addEventListener('click',function(){selectedDates.clear();document.querySelectorAll('.rh-select-day').forEach(function(cb){cb.checked=false;});document.getElementById('rh-toolbar').style.display='none';});
})();
</script>
{% endblock %}
